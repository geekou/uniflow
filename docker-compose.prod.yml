# 生产环境部署文件 —— 使用 GitHub Actions 构建的镜像
# 使用方法：
#
# 首次部署:
#   echo $GITHUB_TOKEN | docker login ghcr.io -u geekou --password-stdin
#   docker compose -f docker-compose.prod.yml up -d
#
# 更新:
#   docker compose -f docker-compose.prod.yml pull
#   docker compose -f docker-compose.prod.yml up -d

services:
  uniflow:
    image: ghcr.io/geekou/uniflow:latest
    container_name: uniflow
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
      - ./backups:/app/backups
    environment:
      - GIN_MODE=release
      - PORT=8080
      - DB_PATH=/app/data/uniflow.db

  # 可选：Watchtower 自动更新容器
  watchtower:
    image: containrrr/watchtower
    container_name: watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 300 uniflow  # 每 5 分钟检查 uniflow 容器更新
