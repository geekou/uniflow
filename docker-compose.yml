services:
  uniflow:
    build:
      context: .
      dockerfile: Dockerfile.binary
    container_name: uniflow
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
      - ./backups:/app/backups
    environment:
      - GIN_MODE=release
      - PORT=9090
      - DB_PATH=/app/data/uniflow.db
