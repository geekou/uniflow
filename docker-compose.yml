services:
  uniflow:
    build: .
    container_name: uniflow
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
      - ./backups:/app/backups
    environment:
      - GIN_MODE=release
      - PORT=8080
      - DB_PATH=/app/data/uniflow.db
