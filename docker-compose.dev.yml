# 本地开发 —— 从源码编译
services:
  uniflow:
    build: .
    container_name: uniflow
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
      - ./backups:/app/backups
    environment:
      - GIN_MODE=debug
      - PORT=9090
      - DB_PATH=/app/data/uniflow.db
