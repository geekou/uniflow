{{define "partials/mobile-header"}}
<div class="md:hidden bg-white px-3 py-2 shadow-xs border-b border-gray-100 sticky top-0 z-40 space-y-2">
    <div class="flex items-center justify-between">
        <div class="flex items-center space-x-2">
            <button id="open-sidebar" class="text-gray-600 p-1 text-lg active:scale-95 transition"><i class="fa-solid fa-bars"></i></button>
            <span class="font-bold text-base tracking-tight text-indigo-600">{{.SiteTitle}}</span>
        </div>
        <div class="flex items-center space-x-3">
            {{if .SiteNotification}}<button onclick="toggleNotification();markNotifRead();" class="text-gray-500 hover:text-indigo-600 transition relative"><i class="fa-regular fa-bell text-sm"></i><span class="notif-dot absolute top-0 right-0 w-1.5 h-1.5 bg-red-500 rounded-full animate-pulse"></span></button>{{else}}<button class="text-gray-300 cursor-default relative"><i class="fa-regular fa-bell text-sm"></i></button>{{end}}
            <a href="/admin" class="block"><img loading="lazy" class="w-7 h-7 rounded-full border hover:ring-2 hover:ring-indigo-300 transition" src="{{if safeImageURL .AboutMe.Avatar}}{{safeImageURL .AboutMe.Avatar}}{{else}}https://api.dicebear.com/7.x/adventurer/svg?seed={{defaultName .AboutMe.Name}}{{end}}" alt="user"></a>
        </div>
    </div>
    <form action="/search" method="get" class="flex items-center space-x-2 bg-gray-50 px-3 py-1.5 rounded-xl border border-gray-100">
        <i class="fa-solid fa-magnifying-glass text-gray-400 text-xs"></i>
        <input type="text" name="q" placeholder="搜索文章、分类或标签..." class="bg-transparent text-sm w-full outline-none text-gray-600 placeholder-gray-400" value="{{.SearchQuery}}">
    </form>
</div>
<div id="sidebar-overlay" class="fixed inset-0 bg-black/40 z-50 invisible opacity-0 transition-opacity duration-300 md:hidden"></div>
{{end}}
