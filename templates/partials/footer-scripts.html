{{define "partials/footer-scripts"}}
{{template "partials/backtotop" .}}
<script>
// 浏览器回退时从 BFCache 恢复可能导致访问量等动态数据显示旧值
// 只在列表页（首页/文章列表）做无感刷新，不影响详情页表单数据
window.addEventListener('pageshow', function(e) {
    if (e.persisted || (window.performance && window.performance.navigation && window.performance.navigation.type === 2)) {
        var path = location.pathname;
        // 详情页保留 BFCache（避免评论表单丢失），列表页强制刷新
        if (path === '/' || path === '/posts' || path === '/moments' || path === '/guestbook' || path === '/about') {
            location.reload();
        }
    }
});
</script>
<script>
(function() {
    var ob = document.getElementById('open-sidebar'), cb = document.getElementById('close-sidebar'),
        sb = document.getElementById('sidebar'), ov = document.getElementById('sidebar-overlay');
    function ts(o) {
        if (o) { sb.classList.remove('-translate-x-full'); ov.classList.remove('invisible','opacity-0'); ov.classList.add('opacity-100'); document.body.classList.add('overflow-hidden'); }
        else { sb.classList.add('-translate-x-full'); ov.classList.remove('opacity-100'); ov.classList.add('opacity-0'); setTimeout(function(){ov.classList.add('invisible');},300); document.body.classList.remove('overflow-hidden'); }
    }
    if (ob) ob.addEventListener('click', function(){ts(true)});
    if (cb) cb.addEventListener('click', function(){ts(false)});
    if (ov) ov.addEventListener('click', function(){ts(false)});
})();
</script>
<script>
(function() {
    var el = document.getElementById('site-uptime');
    if (!el) return;
    var f = el.getAttribute('data-founded');
    if (!f) return;
    var fd = new Date(f);
    if (isNaN(fd.getTime())) return;
    function up() {
        var now = new Date(), diff = now - fd;
        var d=Math.floor(diff/86400000),h=Math.floor((diff%86400000)/3600000),m=Math.floor((diff%3600000)/60000),s=Math.floor((diff%60000)/1000);
        var de=document.getElementById('site-uptime-d'),he=document.getElementById('site-uptime-h'),me=document.getElementById('site-uptime-m'),se=document.getElementById('site-uptime-s');
        if(de)de.textContent=d;if(he)he.textContent=String(h).padStart(2,'0');if(me)me.textContent=String(m).padStart(2,'0');if(se)se.textContent=String(s).padStart(2,'0');
    }
    up();setInterval(up,1000);
})();
</script>
<script>(function(){var p=location.pathname;document.querySelectorAll('nav a').forEach(function(a){var h=a.getAttribute('href');if(h===p||(p!=='/'&&h!=='/'&&p.startsWith(h))){a.classList.add('text-indigo-600','font-semibold');}});})();</script>
<script>
(function() {
    document.querySelectorAll('pre').forEach(function(pre) {
        if (pre.closest('.code-block-wrapper')) return;
        if (pre.querySelector('.copy-btn')) return;
        var wrapper = document.createElement('div');
        wrapper.className = 'code-block-wrapper';
        pre.parentNode.insertBefore(wrapper, pre);
        wrapper.appendChild(pre);
        var btn = document.createElement('button');
        btn.className = 'copy-btn';
        btn.innerHTML = '<i class="fa-regular fa-copy"></i> 复制';
        btn.onclick = function() {
            var code = pre.textContent || '';
            navigator.clipboard.writeText(code).then(function() {
                btn.innerHTML = '<i class="fa-solid fa-check"></i> 已复制';
                btn.classList.add('copied');
                setTimeout(function() {
                    btn.innerHTML = '<i class="fa-regular fa-copy"></i> 复制';
                    btn.classList.remove('copied');
                }, 2000);
            }).catch(function() {
                btn.innerHTML = '失败';
                setTimeout(function() { btn.innerHTML = '<i class="fa-regular fa-copy"></i> 复制'; }, 1500);
            });
        };
        wrapper.appendChild(btn);
    });
})();
</script>
{{end}}
