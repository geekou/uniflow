<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.PageData.Title}} - {{.SiteTitle}}</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .page-content img { border-radius: 12px; }
        .page-content a { color: #4f46e5; text-decoration: underline; }
        .page-content p { margin-bottom: 1em; line-height: 1.8; }
        .page-content h1, .page-content h2, .page-content h3 { font-weight: 700; margin: 1.5em 0 0.5em; }
        .page-content ul, .page-content ol { padding-left: 1.5em; margin-bottom: 1em; }
        .page-content li { margin-bottom: 0.3em; }
    </style>
</head>
<body class="bg-[#F4F6F9] text-gray-800 min-h-screen">

    <!-- 移动端顶栏 -->
    <div class="md:hidden bg-white px-4 py-3 shadow-xs border-b border-gray-100 flex items-center justify-between sticky top-0 z-40">
        <div class="flex items-center space-x-3">
            <button id="open-sidebar" class="text-gray-600 p-1 text-lg active:scale-95 transition">
                <i class="fa-solid fa-bars"></i>
            </button>
            <span class="font-bold text-base tracking-tight text-indigo-600">{{.SiteTitle}}</span>
        </div>
        <a href="/" class="text-xs text-gray-400 hover:text-indigo-600 transition"><i class="fa-solid fa-arrow-left mr-1"></i>首页</a>
    </div>

    <div id="sidebar-overlay" class="fixed inset-0 bg-black/40 z-50 invisible opacity-0 transition-opacity duration-300 md:hidden"></div>

    <div class="max-w-[1400px] mx-auto px-4 py-6">
        <div class="grid grid-cols-1 md:grid-cols-4 lg:grid-cols-5 gap-6 items-start">

            <!-- 左侧栏（与首页共享） -->
            <aside id="sidebar" class="fixed top-0 left-0 bottom-0 w-72 bg-white p-6 z-50 transform -translate-x-full transition-transform duration-300 ease-in-out md:relative md:translate-x-0 md:w-auto md:p-6 md:rounded-3xl md:shadow-xs md:border md:border-gray-100/50 space-y-6 flex flex-col justify-between overflow-y-auto md:overflow-y-visible no-scrollbar h-screen md:h-auto">
                <div class="space-y-6">
                    <div class="flex items-center justify-between md:hidden pb-2 border-b border-gray-50">
                        <span class="font-bold text-gray-400 text-xs tracking-wider">导航菜单</span>
                        <button id="close-sidebar" class="text-gray-400 hover:text-gray-600 p-1 text-lg"><i class="fa-solid fa-xmark"></i></button>
                    </div>
                    <div class="flex items-center space-x-3 px-2">
                        <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center text-white font-bold text-xl shadow-md shadow-indigo-200">U</div>
                        <div>
                            <h1 class="text-lg font-bold tracking-tight">{{.SiteTitle}}</h1>
                            <p class="text-xs text-gray-400">{{.SiteSubtitle}}</p>
                        </div>
                    </div>
                    <nav class="space-y-1">
                        {{range .Menus}}
                        <a href="{{if eq .URL ""}}/{{else}}{{.URL}}{{end}}" class="flex items-center space-x-3 px-4 py-3 text-gray-600 hover:bg-gray-50 hover:text-indigo-600 font-medium rounded-xl transition">
                            {{if .Icon}}<i class="{{.Icon}} text-sm"></i>{{end}} <span>{{.Name}}</span>
                        </a>
                        {{end}}
                    </nav>
                </div>
                <footer class="text-center text-xs text-gray-400 space-y-2 pt-6 border-t border-gray-50">
                    <p>&copy; 2026 {{.SiteTitle}}</p>
                    <p class="text-[10px]">Powered by Go &amp; SQLite</p>
                </footer>
            </aside>

            <!-- 页面主体 -->
            <main class="col-span-1 md:col-span-3 lg:col-span-4">
                <div class="bg-white rounded-2xl p-6 md:p-10 shadow-xs border border-gray-100/50 min-h-[60vh]">
                    <div class="flex items-center space-x-2 text-xs text-gray-400 mb-6">
                        <a href="/" class="hover:text-indigo-600 transition"><i class="fa-solid fa-house"></i> 首页</a>
                        <i class="fa-solid fa-chevron-right text-[8px]"></i>
                        <span class="text-gray-600">{{.PageData.Title}}</span>
                    </div>
                    <h1 class="text-2xl font-bold text-gray-800 mb-8">{{.PageData.Title}}</h1>
                    <div class="page-content text-gray-700 text-sm leading-relaxed">
                        {{.PageData.HTMLContent}}
                    </div>
                </div>
            </main>

        </div>
    </div>

    <script>
        var openBtn = document.getElementById('open-sidebar');
        var closeBtn = document.getElementById('close-sidebar');
        var sidebar = document.getElementById('sidebar');
        var overlay = document.getElementById('sidebar-overlay');
        function toggleSidebar(open) {
            if (open) {
                sidebar.classList.remove('-translate-x-full');
                overlay.classList.remove('invisible', 'opacity-0');
                overlay.classList.add('opacity-100');
                document.body.classList.add('overflow-hidden');
            } else {
                sidebar.classList.add('-translate-x-full');
                overlay.classList.remove('opacity-100');
                overlay.classList.add('opacity-0');
                setTimeout(function() { overlay.classList.add('invisible'); }, 300);
                document.body.classList.remove('overflow-hidden');
            }
        }
        openBtn.addEventListener('click', function() { toggleSidebar(true); });
        closeBtn.addEventListener('click', function() { toggleSidebar(false); });
        overlay.addEventListener('click', function() { toggleSidebar(false); });
    </script>
</body>
</html>
