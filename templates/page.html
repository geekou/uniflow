<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="alternate" type="application/rss+xml" title="{{.SiteTitle}} RSS" href="/rss">
    <title>{{.PageData.Title}} - {{.SiteTitle}}</title>
    <link href="/static/css/dark.css" rel="stylesheet">
    <link href="/static/css/tailwind.css" rel="stylesheet">
    <script src="/static/vendor/tailwindcss.js"></script>
    <link rel="stylesheet" href="/static/vendor/fontawesome/css/all.min.css">
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .page-content img { border-radius: 12px; }
        .page-content a { color: #4f46e5; text-decoration: underline; }
        .page-content p { margin-bottom: 1em; line-height: 1.8; }
        .page-content h1, .page-content h2, .page-content h3 { font-weight: 700; margin: 1.5em 0 0.5em; }
        .page-content ul, .page-content ol { padding-left: 1.5em; margin-bottom: 1em; }
        .page-content li { margin-bottom: 0.3em; }
    </style>
</head>
<body class="bg-[#F4F6F9] text-gray-800 min-h-screen">

{{template "partials/mobile-header" .}}

    <div class="max-w-[1400px] mx-auto px-4 py-6">
        <div class="grid grid-cols-1 md:grid-cols-4 lg:grid-cols-5 gap-6 items-start">

            {{template "partials/sidebar" .}}
            <!-- 页面主体 -->
            <main class="col-span-1 md:col-span-3 lg:col-span-4">
                <div class="bg-white rounded-2xl p-6 md:p-10 shadow-xs border border-gray-100/50 min-h-[60vh]">
                    <div class="flex items-center space-x-2 text-xs text-gray-400 mb-6">
                        <a href="/" class="hover:text-indigo-600 transition"><i class="fa-solid fa-house"></i> 首页</a>
                        <i class="fa-solid fa-chevron-right text-[8px]"></i>
                        <span class="text-gray-600">{{.PageData.Title}}</span>
                    </div>
                    <h1 class="text-2xl font-bold text-gray-800 mb-8">{{.PageData.Title}}</h1>
                    <div class="page-content text-gray-700 text-sm leading-relaxed">
                        {{.PageData.HTMLContent}}
                    </div>
                </div>
            </main>

        </div>
    </div>

{{template "partials/footer-scripts" .}}
</body>
</html>
