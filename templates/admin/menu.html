{{template "admin_head" .}}
    <div class="flex items-center justify-between mb-6">
        <h2 class="text-lg font-bold">菜单管理</h2>
    </div>

    <div class="bg-white rounded-2xl p-6 shadow-xs border border-gray-100/50 space-y-6">
        <!-- Add Menu -->
        <div>
            <h3 class="text-sm font-bold text-gray-500 mb-3">新增菜单</h3>
            <form method="POST" action="/admin/menus/save" class="flex items-end space-x-3 flex-wrap">
                <div class="w-32">
                    <label class="text-xs font-medium text-gray-500 mb-1 block">名称</label>
                    <input type="text" name="name" required class="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-indigo-200 focus:border-indigo-400">
                </div>
                <div class="flex-1 min-w-[140px]">
                    <label class="text-xs font-medium text-gray-500 mb-1 block">URL</label>
                    <input type="text" name="url" placeholder="如：/ 或 /page/links" class="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-indigo-200 focus:border-indigo-400">
                </div>
                <div class="w-44">
                    <label class="text-xs font-medium text-gray-500 mb-1 block">图标类名</label>
                    <input type="text" name="icon" placeholder="如：fa-solid fa-house" class="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-indigo-200 focus:border-indigo-400">
                </div>
                <div class="w-24">
                    <label class="text-xs font-medium text-gray-500 mb-1 block">父级ID</label>
                    <input type="number" name="parent_id" value="0" class="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-indigo-200 focus:border-indigo-400">
                </div>
                <div class="w-20">
                    <label class="text-xs font-medium text-gray-500 mb-1 block">排序</label>
                    <input type="number" name="order_num" value="0" class="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-indigo-200 focus:border-indigo-400">
                </div>
                <button type="submit" class="bg-indigo-600 text-white text-xs px-5 py-2 rounded-xl font-medium hover:bg-indigo-700 transition">添加</button>
            </form>
        </div>

        <!-- Menu List -->
        <table class="w-full text-sm">
            <thead class="bg-gray-50/50 text-xs text-gray-400">
                <tr><th class="text-left px-3 py-3">ID</th><th class="text-left px-3 py-3">名称</th><th class="text-left px-3 py-3">URL</th><th class="text-left px-3 py-3">图标</th><th class="text-left px-3 py-3">排序</th><th class="text-center px-3 py-3">显示</th><th class="text-left px-3 py-3">操作</th></tr>
            </thead>
            <tbody class="divide-y divide-gray-50">
                {{range .Menus}}
                <tr class="hover:bg-gray-50/50 transition" id="menu-row-{{.ID}}">
                    <td class="px-3 py-3 text-xs text-gray-400">{{.ID}}</td>
                    <td class="px-3 py-3">
                        <input type="text" id="name-{{.ID}}" value="{{.Name}}" class="w-20 border border-gray-200 rounded-lg px-2 py-1 text-sm font-medium text-gray-700 outline-none focus:ring-1 focus:ring-indigo-200">
                    </td>
                    <td class="px-3 py-3 text-xs text-gray-500">{{if .URL}}{{.URL}}{{else}}-{{end}}</td>
                    <td class="px-3 py-3">
                        <input type="text" id="icon-{{.ID}}" value="{{.Icon}}" class="w-32 border border-gray-200 rounded-lg px-2 py-1 text-xs text-gray-500 outline-none focus:ring-1 focus:ring-indigo-200">
                    </td>
                    <td class="px-3 py-3">
                        <input type="number" id="order-{{.ID}}" value="{{.OrderNum}}" class="w-14 border border-gray-200 rounded-lg px-2 py-1 text-xs text-gray-400 outline-none focus:ring-1 focus:ring-indigo-200">
                    </td>
                    <td class="px-3 py-3 text-center">
                        <label class="relative inline-flex items-center cursor-pointer">
                            <input type="checkbox" id="visible-{{.ID}}" {{if .Visible}}checked{{end}} onchange="updateMenu({{.ID}})" class="sr-only peer">
                            <div class="w-9 h-5 bg-gray-200 peer-focus:ring-1 peer-focus:ring-indigo-200 rounded-full peer peer-checked:after:translate-x-full rtl:peer-checked:after:-translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:start-[2px] after:bg-white after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-indigo-500"></div>
                        </label>
                    </td>
                    <td class="px-3 py-3 flex items-center gap-2">
                        <button onclick="updateMenu({{.ID}})" class="text-xs text-indigo-500 hover:text-indigo-700"><i class="fa-solid fa-check"></i> 保存</button>
                        {{if not .IsSystem}}
                        <button onclick="confirmAction('确定删除此菜单？', '/admin/menus/delete/{{.ID}}')" class="text-xs text-red-400 hover:text-red-600"><i class="fa-solid fa-trash"></i></button>
                        {{else}}
                        <span class="text-[10px] text-gray-300 px-1.5 py-0.5 bg-gray-50 rounded">系统</span>
                        {{end}}
                    </td>
                </tr>
                {{end}}
            </tbody>
        </table>
        <div class="text-xs text-gray-400 mt-2"><i class="fa-solid fa-circle-info mr-1"></i>系统菜单不可删除，可修改名称、图标、排序和显示状态</div>
    </div>

    <script>
        function updateMenu(id) {
            var name = document.getElementById('name-' + id).value;
            var icon = document.getElementById('icon-' + id).value;
            var order = document.getElementById('order-' + id).value;
            var visible = document.getElementById('visible-' + id).checked ? '1' : '0';
            var fd = new FormData();
            fd.append('id', id);
            fd.append('name', name);
            fd.append('icon', icon);
            fd.append('order_num', order);
            fd.append('visible', visible);
            fetch('/admin/menus/update', { method: 'POST', body: fd })
                .then(r => r.json())
                .then(data => { if (!data.ok) alert(data.msg || '保存失败'); })
                .catch(() => alert('网络错误'));
        }
    </script>
{{template "admin_tail" .}}
