{{template "admin_head" .}}
    <div class="flex items-center justify-between mb-6">
        <h2 class="text-lg font-bold">菜单管理</h2>
    </div>

    <div class="bg-white rounded-2xl p-6 shadow-xs border border-gray-100/50 space-y-6">
        <!-- Add Menu -->
        <div>
            <h3 class="text-sm font-bold text-gray-500 mb-3">新增菜单</h3>
            <form method="POST" action="/admin/menus/save" class="flex items-end space-x-3 flex-wrap">
                <div class="w-32">
                    <label class="text-xs font-medium text-gray-500 mb-1 block">名称</label>
                    <input type="text" name="name" required class="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-indigo-200 focus:border-indigo-400">
                </div>
                <div class="flex-1 min-w-[140px]">
                    <label class="text-xs font-medium text-gray-500 mb-1 block">URL</label>
                    <input type="text" name="url" placeholder="如：/ 或 /page/links" class="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-indigo-200 focus:border-indigo-400">
                </div>
                <div class="w-44">
                    <label class="text-xs font-medium text-gray-500 mb-1 block">图标类名</label>
                    <input type="text" name="icon" placeholder="如：fa-solid fa-house" class="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-indigo-200 focus:border-indigo-400">
                </div>
                <div class="w-24">
                    <label class="text-xs font-medium text-gray-500 mb-1 block">父级ID</label>
                    <input type="number" name="parent_id" value="0" class="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-indigo-200 focus:border-indigo-400">
                </div>
                <div class="w-20">
                    <label class="text-xs font-medium text-gray-500 mb-1 block">排序</label>
                    <input type="number" name="order_num" value="0" class="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-indigo-200 focus:border-indigo-400">
                </div>
                <button type="submit" class="bg-indigo-600 text-white text-xs px-5 py-2 rounded-xl font-medium hover:bg-indigo-700 transition">添加</button>
            </form>
        </div>

        <!-- Menu List -->
        <table class="w-full text-sm">
            <thead class="bg-gray-50/50 text-xs text-gray-400">
                <tr><th class="text-left px-4 py-3">ID</th><th class="text-left px-4 py-3">名称</th><th class="text-left px-4 py-3">URL</th><th class="text-left px-4 py-3">图标</th><th class="text-left px-4 py-3">排序</th><th class="text-left px-4 py-3">操作</th></tr>
            </thead>
            <tbody class="divide-y divide-gray-50">
                {{range .Menus}}
                <tr class="hover:bg-gray-50/50 transition">
                    <td class="px-4 py-3 text-xs text-gray-400">{{.ID}}</td>
                    <td class="px-4 py-3 font-medium text-gray-700">{{.Name}}</td>
                    <td class="px-4 py-3 text-xs text-gray-500">{{if .URL}}{{.URL}}{{else}}<span class="text-gray-300">-</span>{{end}}</td>
                    <td class="px-4 py-3 text-xs text-gray-500">{{if .Icon}}<i class="{{.Icon}}"></i>{{else}}<span class="text-gray-300">-</span>{{end}}</td>
                    <td class="px-4 py-3 text-xs text-gray-400">{{.OrderNum}}</td>
                    <td class="px-4 py-3">
                        <button onclick="confirmAction('确定删除此菜单？', '/admin/menus/delete/{{.ID}}')" class="text-xs text-red-400 hover:text-red-600"><i class="fa-solid fa-trash"></i></button>
                    </td>
                </tr>
                {{end}}
            </tbody>
        </table>
        {{if eq (len .Menus) 0}}<div class="text-center py-8 text-sm text-gray-400">暂无菜单</div>{{end}}
    </div>
{{template "admin_tail" .}}
