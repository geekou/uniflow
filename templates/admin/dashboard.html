{{template "admin_head" .}}
    <div class="flex items-center justify-between mb-6">
        <h2 class="text-lg font-bold">Dashboard</h2>
        <span class="text-xs text-gray-400">{{.Now}}</span>
    </div>

    <!-- Stats Cards -->
    <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
        <div class="bg-white rounded-2xl p-5 shadow-xs border border-gray-100/50">
            <div class="flex items-center justify-between mb-3">
                <div class="w-10 h-10 bg-indigo-50 rounded-xl flex items-center justify-center"><i class="fa-solid fa-book text-indigo-500"></i></div>
                <span class="text-[10px] text-gray-400 bg-gray-50 px-2 py-0.5 rounded-full">文章</span>
            </div>
            <p class="text-2xl font-bold">{{.Stats.PostCount}}</p>
        </div>
        <div class="bg-white rounded-2xl p-5 shadow-xs border border-gray-100/50">
            <div class="flex items-center justify-between mb-3">
                <div class="w-10 h-10 bg-amber-50 rounded-xl flex items-center justify-center"><i class="fa-solid fa-bolt text-amber-500"></i></div>
                <span class="text-[10px] text-gray-400 bg-gray-50 px-2 py-0.5 rounded-full">瞬间</span>
            </div>
            <p class="text-2xl font-bold">{{.Stats.MomentCount}}</p>
        </div>
        <div class="bg-white rounded-2xl p-5 shadow-xs border border-gray-100/50">
            <div class="flex items-center justify-between mb-3">
                <div class="w-10 h-10 bg-green-50 rounded-xl flex items-center justify-center"><i class="fa-solid fa-comment text-green-500"></i></div>
                <span class="text-[10px] text-gray-400 bg-gray-50 px-2 py-0.5 rounded-full">评论</span>
            </div>
            <p class="text-2xl font-bold">{{.Stats.CommentCount}}</p>
        </div>
        <div class="bg-white rounded-2xl p-5 shadow-xs border border-gray-100/50">
            <div class="flex items-center justify-between mb-3">
                <div class="w-10 h-10 bg-purple-50 rounded-xl flex items-center justify-center"><i class="fa-solid fa-message text-purple-500"></i></div>
                <span class="text-[10px] text-gray-400 bg-gray-50 px-2 py-0.5 rounded-full">留言</span>
            </div>
            <p class="text-2xl font-bold">{{.Stats.GuestbookCount}}</p>
        </div>
    </div>

    <!-- 版本信息 -->
    <div class="bg-white rounded-2xl p-5 shadow-xs border border-gray-100/50 mb-6 flex items-center justify-between">
        <div class="flex items-center space-x-3">
            <span class="text-xs text-gray-400">当前版本</span>
            <span class="text-sm font-bold text-indigo-600 bg-indigo-50 px-3 py-1 rounded-lg">{{.Version}}</span>
        </div>
        <button id="check-update-btn" onclick="checkUpdate()" class="text-xs bg-white text-gray-600 px-3 py-2 rounded-xl border border-gray-200 hover:bg-gray-50 hover:text-indigo-600 transition font-medium">
            <i class="fa-solid fa-arrows-rotate mr-1"></i>检查更新
        </button>
    </div>
    <div id="update-result" class="hidden mb-6"></div>

    <!-- Quick Actions -->
    <div class="bg-white rounded-2xl p-6 shadow-xs border border-gray-100/50">
        <h3 class="text-sm font-bold text-gray-500 mb-4">快捷操作</h3>
        <div class="flex flex-wrap gap-3">
            <a href="/admin/posts/create" class="inline-flex items-center space-x-2 bg-indigo-600 text-white text-xs px-4 py-2.5 rounded-xl font-medium hover:bg-indigo-700 transition shadow-xs shadow-indigo-100">
                <i class="fa-solid fa-pen-to-square"></i><span>发布文章</span>
            </a>
            <a href="/admin/moments/create" class="inline-flex items-center space-x-2 bg-amber-500 text-white text-xs px-4 py-2.5 rounded-xl font-medium hover:bg-amber-600 transition shadow-xs shadow-amber-100">
                <i class="fa-solid fa-bolt"></i><span>发布瞬间</span>
            </a>
            <a href="/admin/settings" class="inline-flex items-center space-x-2 bg-white text-gray-600 text-xs px-4 py-2.5 rounded-xl font-medium hover:bg-gray-50 transition border border-gray-200">
                <i class="fa-solid fa-gear"></i><span>网站设置</span>
            </a>
            <a href="/admin/backup" class="inline-flex items-center space-x-2 bg-white text-gray-600 text-xs px-4 py-2.5 rounded-xl font-medium hover:bg-gray-50 transition border border-gray-200">
                <i class="fa-solid fa-database"></i><span>备份恢复</span>
            </a>
        </div>
    </div>

<script>
function checkUpdate() {
    var btn = document.getElementById('check-update-btn');
    var result = document.getElementById('update-result');
    btn.disabled = true;
    btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-1"></i>检查中...';
    result.className = 'hidden';

    fetch('/admin/api/version/check')
        .then(function(r) { return r.json(); })
        .then(function(d) {
            btn.disabled = false;
            btn.innerHTML = '<i class="fa-solid fa-arrows-rotate mr-1"></i>检查更新';
            result.className = 'bg-white rounded-2xl p-4 shadow-xs border';

            if (d.error) {
                result.className += ' border-amber-200';
                result.innerHTML = '<div class="flex items-center space-x-2 text-amber-600 text-sm"><i class="fa-solid fa-triangle-exclamation"></i><span>' + d.error + '</span></div>';
            } else if (d.hasUpdate) {
                result.className += ' border-green-200';
                result.innerHTML = '<div class="space-y-3">' +
                    '<div class="flex items-center justify-between">' +
                        '<div class="flex items-center space-x-2 text-green-600 text-sm"><i class="fa-solid fa-circle-arrow-up"></i><span>发现新版本 <b>' + d.latest + '</b>（当前 ' + d.current + '）</span></div>' +
                        '<a href="https://github.com/geekou/uniflow/releases/latest" target="_blank" class="text-xs bg-green-600 text-white px-3 py-1.5 rounded-lg hover:bg-green-700 transition">查看 Release</a>' +
                    '</div>' +
                    '<div class="bg-gray-900 text-green-400 text-xs rounded-xl p-3 font-mono leading-relaxed">' +
                        '<div class="text-gray-500 mb-1"># 服务器上执行以下命令更新：</div>' +
                        '<div>cd uniflow</div>' +
                        '<div>git pull</div>' +
                        '<div>docker compose up -d --build</div>' +
                        '<div>docker image prune -f</div>' +
                    '</div>' +
                '</div>';
            } else {
                result.className += ' border-gray-200';
                result.innerHTML = '<div class="flex items-center space-x-2 text-gray-500 text-sm"><i class="fa-solid fa-circle-check text-green-500"></i><span>已是最新版本 ' + d.current + '</span></div>';
            }
        })
        .catch(function() {
            btn.disabled = false;
            btn.innerHTML = '<i class="fa-solid fa-arrows-rotate mr-1"></i>检查更新';
            result.className = 'bg-white rounded-2xl p-4 shadow-xs border border-amber-200';
            result.innerHTML = '<div class="flex items-center space-x-2 text-amber-600 text-sm"><i class="fa-solid fa-triangle-exclamation"></i><span>网络错误，请稍后重试</span></div>';
        });
}
</script>
{{template "admin_tail" .}}
