{{template "admin_head" .}}
<div class="space-y-6">
    <h2 class="text-lg font-bold text-gray-800">站点地图</h2>

    <div class="bg-white rounded-2xl p-6 shadow-xs border border-gray-100/50 space-y-4">
        <div class="flex items-center space-x-3">
            <div class="w-10 h-10 bg-green-50 rounded-xl flex items-center justify-center">
                <i class="fa-solid fa-check-circle text-green-500"></i>
            </div>
            <div>
                <p class="text-sm font-semibold text-gray-700">Sitemap 已生成</p>
                <p class="text-xs text-gray-400 mt-0.5">{{.SitemapPath}}</p>
            </div>
        </div>

        <div class="flex items-center space-x-3 pt-2">
            <a href="/static/sitemap.xml" target="_blank" class="inline-flex items-center space-x-2 bg-indigo-600 text-white text-xs px-4 py-2.5 rounded-xl hover:bg-indigo-700 transition">
                <i class="fa-solid fa-external-link-alt"></i>
                <span>查看 sitemap.xml</span>
            </a>
            <button onclick="window.location.reload()" class="inline-flex items-center space-x-2 bg-gray-100 text-gray-600 text-xs px-4 py-2.5 rounded-xl hover:bg-gray-200 transition">
                <i class="fa-solid fa-rotate"></i>
                <span>重新生成</span>
            </button>
        </div>
    </div>

    <div class="bg-white rounded-2xl p-6 shadow-xs border border-gray-100/50">
        <h3 class="text-sm font-bold text-gray-700 mb-3">使用说明</h3>
        <div class="text-xs text-gray-500 space-y-2 leading-relaxed">
            <p><i class="fa-solid fa-info-circle text-indigo-400 mr-1"></i>Sitemap 文件已生成到 <code class="bg-gray-100 px-1.5 py-0.5 rounded text-indigo-600">static/sitemap.xml</code>，搜索引擎可通过此文件抓取网站内容。</p>
            <p><i class="fa-solid fa-link text-indigo-400 mr-1"></i>将此链接提交到 Google Search Console、百度站长平台等搜索引擎，加速索引。</p>
            <p><i class="fa-solid fa-clock text-indigo-400 mr-1"></i>每次发布新文章或页面后，建议重新生成 Sitemap。</p>
        </div>
    </div>
</div>
{{template "admin_tail" .}}
