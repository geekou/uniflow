{{template "admin_head" .}}
    <div class="flex items-center justify-between mb-6">
        <h2 class="text-lg font-bold">设备管理</h2>
    </div>

    <div class="bg-white rounded-2xl p-6 shadow-xs border border-gray-100/50 space-y-6">
        <!-- Add / Edit Device -->
        <form id="device-form" class="space-y-3" enctype="multipart/form-data">
            <input type="hidden" name="id" id="dev-id" value="">
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                <div>
                    <label class="text-xs font-medium text-gray-500 mb-1 block">设备名称 <span class="text-red-400">*</span></label>
                    <input type="text" name="name" id="dev-name" required placeholder="如：MacBook Pro 16" class="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-indigo-200 focus:border-indigo-400">
                </div>
                <div>
                    <label class="text-xs font-medium text-gray-500 mb-1 block">设备信息</label>
                    <input type="text" name="info" id="dev-info" placeholder="如：Apple M3 Max / 36GB / 1TB" class="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-indigo-200 focus:border-indigo-400">
                </div>
            </div>
            <div class="flex items-center gap-3 flex-wrap">
                <div>
                    <label class="text-xs font-medium text-gray-500 mb-1 block">本地上传图片</label>
                    <label class="inline-flex items-center gap-1.5 bg-gray-50 hover:bg-gray-100 text-xs text-gray-600 px-3 py-2 rounded-xl cursor-pointer border border-gray-200 transition">
                        <i class="fa-solid fa-upload"></i> 选择图片
                        <input type="file" name="image_file" accept="image/*" class="hidden" onchange="previewDeviceImage(this)">
                    </label>
                </div>
                <div>
                    <label class="text-xs font-medium text-gray-500 mb-1 block">或填写图片URL</label>
                    <input type="text" name="image_url" id="dev-image" placeholder="https://..." class="border border-gray-200 rounded-xl px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-indigo-200 focus:border-indigo-400 w-48">
                </div>
                <div>
                    <label class="text-xs font-medium text-gray-500 mb-1 block">排序</label>
                    <input type="number" name="order_num" id="dev-order" value="0" class="w-16 border border-gray-200 rounded-xl px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-indigo-200 focus:border-indigo-400">
                </div>
            </div>
            <div id="dev-preview" class="hidden mt-2"><img loading="lazy" id="dev-preview-img" class="w-24 h-24 rounded-xl object-cover border border-gray-100"></div>
            <div class="flex items-center gap-3">
                <button type="submit" class="bg-indigo-600 text-white text-xs px-5 py-2 rounded-xl font-medium hover:bg-indigo-700 transition">保存</button>
                <button type="button" id="dev-cancel" class="hidden text-xs text-gray-400 hover:text-gray-600 transition" onclick="cancelEdit()">取消</button>
            </div>
        </form>

        <!-- Device List (Cards) -->
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 pt-4 border-t border-gray-100" id="device-list">
            {{range .Devices}}
            <div class="bg-gray-50 rounded-xl p-4 border border-gray-100 hover:shadow-md transition group">
                {{if .ImageURL}}
                <div class="w-full h-32 rounded-lg overflow-hidden mb-3 bg-white">
                    <img loading="lazy" src="{{.ImageURL}}" class="w-full h-full object-cover" alt="{{.Name}}">
                </div>
                {{else}}
                <div class="w-full h-20 rounded-lg bg-gradient-to-br from-gray-200 to-gray-300 flex items-center justify-center text-gray-400 text-2xl mb-3">
                    <i class="fa-solid fa-display"></i>
                </div>
                {{end}}
                <h3 class="font-semibold text-sm text-gray-800">{{.Name}}</h3>
                {{if .Info}}<p class="text-xs text-gray-500 mt-1">{{.Info}}</p>{{end}}
                <div class="flex items-center gap-3 mt-3 opacity-0 group-hover:opacity-100 transition">
                    <button onclick='editDevice({{.ID}}, "{{.Name}}", "{{.ImageURL}}", "{{.Info}}", {{.OrderNum}})' class="text-xs text-indigo-500 hover:text-indigo-700"><i class="fa-solid fa-pen-to-square"></i> 编辑</button>
                    <button onclick="confirmAction('确定删除此设备？', '/admin/devices/delete/{{.ID}}')" class="text-xs text-red-400 hover:text-red-600"><i class="fa-solid fa-trash"></i> 删除</button>
                </div>
            </div>
            {{end}}
        </div>
        {{if eq (len .Devices) 0}}<div class="text-center py-8 text-sm text-gray-400">暂无设备，添加上方表单添加</div>{{end}}
    </div>

    <script>
        function previewDeviceImage(input) {
            var preview = document.getElementById('dev-preview');
            var img = document.getElementById('dev-preview-img');
            if (input.files && input.files[0]) {
                img.src = URL.createObjectURL(input.files[0]);
                preview.classList.remove('hidden');
            } else {
                preview.classList.add('hidden');
            }
        }

        document.getElementById('device-form').addEventListener('submit', function(e) {
            e.preventDefault();
            var fd = new FormData(this);
            fetch('/admin/devices/save', { method: 'POST', body: fd })
                .then(r => r.json())
                .then(data => { if (data.ok) location.reload(); else alert(data.msg || '保存失败'); })
                .catch(() => alert('网络错误'));
        });

        function editDevice(id, name, image, info, order) {
            document.getElementById('dev-id').value = id;
            document.getElementById('dev-name').value = name;
            document.getElementById('dev-image').value = image;
            document.getElementById('dev-info').value = info;
            document.getElementById('dev-order').value = order;
            document.getElementById('dev-cancel').classList.remove('hidden');
        }

        function cancelEdit() {
            document.getElementById('device-form').reset();
            document.getElementById('dev-id').value = '';
            document.getElementById('dev-cancel').classList.add('hidden');
        }

        function confirmAction(msg, url) {
            if (confirm(msg)) {
                fetch(url, { method: 'POST' }).then(r => r.json()).then(data => { if (data.ok) location.reload(); });
            }
        }
    </script>
{{template "admin_tail" .}}
