<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - UniFlow 管理</title>
    <link href="/static/css/tailwind.css" rel="stylesheet">
    <script src="/static/vendor/tailwindcss.js"></script>
    <link rel="stylesheet" href="/static/vendor/fontawesome/css/all.min.css">
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
    </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-indigo-50 via-white to-purple-50 flex items-center justify-center p-4">
    <div class="w-full max-w-sm">
        <div class="bg-white rounded-2xl p-8 shadow-lg border border-gray-100/50">
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-indigo-600 rounded-2xl flex items-center justify-center text-white font-bold text-2xl mx-auto mb-4 shadow-lg shadow-indigo-200">U</div>
                <h1 class="text-xl font-bold text-gray-800">UniFlow 管理后台</h1>
                <p class="text-xs text-gray-400 mt-1">请输入管理员账号密码</p>
            </div>
            {{if .Error}}
            <div class="bg-red-50 text-red-500 text-xs px-4 py-2.5 rounded-xl mb-4 flex items-center space-x-2">
                <i class="fa-solid fa-circle-exclamation"></i><span>{{.Error}}</span>
            </div>
            {{end}}
            <form method="POST" action="/admin/login" data-no-toast class="space-y-4">
                <div>
                    <label class="text-xs font-medium text-gray-500 mb-1 block">用户名</label>
                    <div class="flex items-center border border-gray-200 rounded-xl px-3 py-2.5 focus-within:ring-2 focus-within:ring-indigo-200 focus-within:border-indigo-400 transition">
                        <i class="fa-regular fa-user text-gray-400 text-sm mr-2"></i>
                        <input type="text" name="username" required placeholder="请输入用户名" class="flex-1 text-sm outline-none bg-transparent placeholder-gray-300">
                    </div>
                </div>
                <div>
                    <label class="text-xs font-medium text-gray-500 mb-1 block">密码</label>
                    <div class="flex items-center border border-gray-200 rounded-xl px-3 py-2.5 focus-within:ring-2 focus-within:ring-indigo-200 focus-within:border-indigo-400 transition">
                        <i class="fa-solid fa-lock text-gray-400 text-sm mr-2"></i>
                        <input type="password" name="password" required placeholder="请输入密码" class="flex-1 text-sm outline-none bg-transparent placeholder-gray-300">
                    </div>
                </div>
                <button type="submit" class="w-full bg-indigo-600 text-white py-2.5 rounded-xl font-medium text-sm hover:bg-indigo-700 transition shadow-xs shadow-indigo-100 active:scale-[0.98]">
                    登 录
                </button>
            </form>
            <div class="text-center mt-6">
                <a href="/" class="text-xs text-gray-400 hover:text-indigo-600 transition"><i class="fa-solid fa-arrow-left mr-1"></i>返回前台首页</a>
            </div>
        </div>
    </div>
</body>
</html>
